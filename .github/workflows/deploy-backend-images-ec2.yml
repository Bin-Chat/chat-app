name: Deploy Backend Images to EC2

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api-gateway
          - auth-service
          - user-service
          - friend-service
          - notification-service
          - upload-service
          - chat-service
          - ai-service
      tag:
        description: Image tag to deploy, for example main or sha-abcdef0
        required: true
        default: main

concurrency:
  group: deploy-backend-images-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull Images and Restart EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -Eeuo pipefail
            cd ~/chat-app

            SERVICE="${{ github.event.inputs.service }}"
            TAG="${{ github.event.inputs.tag }}"
            COMPOSE="-f docker-compose.yml -f docker-compose.env-production.yml -f docker-compose.prod-images.yml"

            if [ ! -f .env.images ]; then
              {
                echo "API_GATEWAY_TAG=main"
                echo "AUTH_SERVICE_TAG=main"
                echo "USER_SERVICE_TAG=main"
                echo "FRIEND_SERVICE_TAG=main"
                echo "NOTIFICATION_SERVICE_TAG=main"
                echo "UPLOAD_SERVICE_TAG=main"
                echo "CHAT_SERVICE_TAG=main"
                echo "AI_SERVICE_TAG=main"
              } > .env.images
            fi

            cp .env.images .env.images.previous

            set_tag() {
              key="$1"
              tag="$2"
              if grep -q "^${key}=" .env.images; then
                sed -i "s/^${key}=.*/${key}=${tag}/" .env.images
              else
                echo "${key}=${tag}" >> .env.images
              fi
            }

            if [ "$SERVICE" = "all" ]; then
              set_tag API_GATEWAY_TAG "$TAG"
              set_tag AUTH_SERVICE_TAG "$TAG"
              set_tag USER_SERVICE_TAG "$TAG"
              set_tag FRIEND_SERVICE_TAG "$TAG"
              set_tag NOTIFICATION_SERVICE_TAG "$TAG"
              set_tag UPLOAD_SERVICE_TAG "$TAG"
              set_tag CHAT_SERVICE_TAG "$TAG"
              set_tag AI_SERVICE_TAG "$TAG"
              TARGET_SERVICES=""
            elif [ "$SERVICE" = "api-gateway" ]; then
              set_tag API_GATEWAY_TAG "$TAG"
              TARGET_SERVICES="api-gateway"
            elif [ "$SERVICE" = "auth-service" ]; then
              set_tag AUTH_SERVICE_TAG "$TAG"
              TARGET_SERVICES="auth-service api-gateway"
            elif [ "$SERVICE" = "user-service" ]; then
              set_tag USER_SERVICE_TAG "$TAG"
              TARGET_SERVICES="user-service api-gateway"
            elif [ "$SERVICE" = "friend-service" ]; then
              set_tag FRIEND_SERVICE_TAG "$TAG"
              TARGET_SERVICES="friend-service api-gateway"
            elif [ "$SERVICE" = "notification-service" ]; then
              set_tag NOTIFICATION_SERVICE_TAG "$TAG"
              TARGET_SERVICES="notification-service api-gateway"
            elif [ "$SERVICE" = "upload-service" ]; then
              set_tag UPLOAD_SERVICE_TAG "$TAG"
              TARGET_SERVICES="upload-service api-gateway"
            elif [ "$SERVICE" = "chat-service" ]; then
              set_tag CHAT_SERVICE_TAG "$TAG"
              TARGET_SERVICES="chat-service api-gateway"
            elif [ "$SERVICE" = "ai-service" ]; then
              set_tag AI_SERVICE_TAG "$TAG"
              TARGET_SERVICES="ai-service api-gateway"
            else
              echo "Unknown service: $SERVICE"
              exit 1
            fi

            if [ -n "$TARGET_SERVICES" ]; then
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE pull $TARGET_SERVICES
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE up -d --remove-orphans $TARGET_SERVICES
            else
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE pull
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE up -d --remove-orphans
            fi

            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000/api/health; then
                echo
                curl -fsS https://api.binchat.me/api/health
                echo
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed. Rolling back .env.images"
            cp .env.images.previous .env.images
            if [ -n "$TARGET_SERVICES" ]; then
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE pull $TARGET_SERVICES
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE up -d --remove-orphans $TARGET_SERVICES
            else
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE pull
              sudo docker compose --env-file .env --env-file .env.images $COMPOSE up -d --remove-orphans
            fi
            exit 1
