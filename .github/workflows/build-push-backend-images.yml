name: Build and Push Backend Images

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options:
          - all
          - api-gateway
          - auth-service
          - user-service
          - friend-service
          - notification-service
          - upload-service
          - chat-service
          - ai-service
  push:
    branches:
      - main
    paths:
      - gateway
      - gateway/**
      - services/auth
      - services/auth/**
      - services/user
      - services/user/**
      - services/friend
      - services/friend/**
      - services/notification
      - services/notification/**
      - services/upload
      - services/upload/**
      - services/chat
      - services/chat/**
      - services/ai
      - services/ai/**
      - docker-compose.prod-images.yml
      - .github/workflows/build-push-backend-images.yml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: bin-chat

concurrency:
  group: build-push-backend-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: gateway/api-gateway
            image: api-gateway
          - service: auth-service
            context: services/auth
            image: auth-service
          - service: user-service
            context: services/user
            image: user-service
          - service: friend-service
            context: services/friend
            image: friend-service
          - service: notification-service
            context: services/notification
            image: notification-service
          - service: upload-service
            context: services/upload
            image: upload-service
          - service: chat-service
            context: services/chat
            image: chat-service
          - service: ai-service
            context: services/ai
            image: ai-service

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout backend submodules only
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

          git submodule sync -- \
            gateway \
            services/auth \
            services/user \
            services/friend \
            services/notification \
            services/upload \
            services/chat \
            services/ai

          git submodule update --init --depth 1 -- \
            gateway \
            services/auth \
            services/user \
            services/friend \
            services/notification \
            services/upload \
            services/chat \
            services/ai

      - name: Decide whether to build this service
        id: decide
        run: |
          selected="${{ github.event.inputs.service || 'all' }}"
          if [ "$selected" = "all" ] || [ "$selected" = "${{ matrix.service }}" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.decide.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.decide.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        if: steps.decide.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Build and push image
        if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Skip service
        if: steps.decide.outputs.build != 'true'
        run: echo "Skip ${{ matrix.service }}"
