name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "gateway"
      - "gateway/**"
      - "services/auth"
      - "services/user"
      - "services/friend"
      - "services/notification"
      - "services/upload"
      - "services/chat"
      - "services/ai"
      - "services/**"
      - "docker-compose.yml"
      - "docker-compose.env-production.yml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "gateway"
      - "gateway/**"
      - "services/auth"
      - "services/user"
      - "services/friend"
      - "services/notification"
      - "services/upload"
      - "services/chat"
      - "services/ai"
      - "services/**"
      - "docker-compose.yml"
      - "docker-compose.env-production.yml"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Changed Backend Parts
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      friend: ${{ steps.filter.outputs.friend }}
      notification: ${{ steps.filter.outputs.notification }}
      upload: ${{ steps.filter.outputs.upload }}
      chat: ${{ steps.filter.outputs.chat }}
      ai: ${{ steps.filter.outputs.ai }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_gateway:
              - "gateway"
              - "gateway/**"
            auth:
              - "services/auth"
              - "services/auth/**"
            user:
              - "services/user"
              - "services/user/**"
            friend:
              - "services/friend"
              - "services/friend/**"
            notification:
              - "services/notification"
              - "services/notification/**"
            upload:
              - "services/upload"
              - "services/upload/**"
            chat:
              - "services/chat"
              - "services/chat/**"
            ai:
              - "services/ai"
              - "services/ai/**"
            compose:
              - "docker-compose.yml"
              - "docker-compose.env-production.yml"

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: gateway/api-gateway
            changed: ${{ (needs.detect.outputs.api_gateway == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: auth-service
            context: services/auth
            changed: ${{ (needs.detect.outputs.auth == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: user-service
            context: services/user
            changed: ${{ (needs.detect.outputs.user == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: friend-service
            context: services/friend
            changed: ${{ (needs.detect.outputs.friend == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: notification-service
            context: services/notification
            changed: ${{ (needs.detect.outputs.notification == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: upload-service
            context: services/upload
            changed: ${{ (needs.detect.outputs.upload == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: chat-service
            context: services/chat
            changed: ${{ (needs.detect.outputs.chat == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
          - service: ai-service
            context: services/ai
            changed: ${{ (needs.detect.outputs.ai == 'true' || needs.detect.outputs.compose == 'true') && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Skip unchanged service
        if: matrix.changed != 'true'
        run: echo "${{ matrix.service }} unchanged, skip Docker build."
