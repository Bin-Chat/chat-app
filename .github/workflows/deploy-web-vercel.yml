name: Deploy Web to Vercel

on:
  repository_dispatch:
    types:
      - web-deploy
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/web"
      - "apps/web/**"
      - ".gitmodules"
      - ".github/workflows/deploy-web-vercel.yml"

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_URL: https://api.binchat.me
          VITE_SOCKET_URL: https://api.binchat.me

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: https://api.binchat.me
          VITE_SOCKET_URL: https://api.binchat.me

      - name: Deploy prebuilt output
        id: deploy
        run: |
          url=$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke check web
        run: curl -fsS "${{ steps.deploy.outputs.url }}" >/dev/null
