  # ========================================
  # API GATEWAY (NestJS)
  # ========================================

  api-gateway:
    build:
      context: ./gateway/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=super-secret-jwt-key-2026-change-this-in-production-abc123xyz
      - AUTH_SERVICE_URL=http://auth-service:3010
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000
    depends_on:
      - auth-service
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # MICROSERVICES - Auth Service (NestJS)
  # ========================================

  # Auth Service (NestJS)
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      - NODE_ENV=development
      - PORT=3010
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=chatapp
      - DB_USERNAME=chatapp
      - DB_PASSWORD=ngocanh123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-jwt-key-2026-change-this-in-production-abc123xyz
      - JWT_REFRESH_SECRET=super-secret-refresh-key-2026-change-this-in-production-xyz789abc
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
    depends_on:
      - postgres
      - redis
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3010/api/auth/health']
      interval: 30s
      timeout: 10s
      retries: 3

