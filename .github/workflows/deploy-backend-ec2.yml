name: Deploy Backend to EC2

on:
  repository_dispatch:
    types:
      - backend-deploy
  workflow_dispatch:
    inputs:
      build_mode:
        description: "What should be rebuilt on EC2?"
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all
          - none
          - single
      service:
        description: "Used only when build_mode=single"
        required: false
        default: api-gateway
        type: choice
        options:
          - api-gateway
          - auth-service
          - user-service
          - friend-service
          - notification-service
          - upload-service
          - chat-service
          - ai-service
      update_submodules:
        description: "Pull latest main branch in every service repo/submodule"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - "gateway"
      - "gateway/**"
      - "services/auth"
      - "services/user"
      - "services/friend"
      - "services/notification"
      - "services/upload"
      - "services/chat"
      - "services/ai"
      - "services/**"
      - "docker-compose.yml"
      - "docker-compose.env-production.yml"
      - ".gitmodules"
      - ".github/workflows/deploy-backend-ec2.yml"

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    steps:
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode || github.event.client_payload.build_mode || 'changed' }}
          SINGLE_SERVICE: ${{ github.event.inputs.service || github.event.client_payload.service || 'api-gateway' }}
          UPDATE_SUBMODULES: ${{ github.event.inputs.update_submodules || github.event.client_payload.update_submodules || 'true' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: BUILD_MODE,SINGLE_SERVICE,UPDATE_SUBMODULES
          script_stop: true
          command_timeout: 55m
          script: |
            set -Eeuo pipefail

            APP_DIR="${APP_DIR:-$HOME/chat-app}"
            STATE_DIR="$HOME/.binchat-deploy"
            STATE_FILE="$STATE_DIR/backend-heads.env"
            COMPOSE_FILES="-f docker-compose.yml"

            mkdir -p "$STATE_DIR"
            cd "$APP_DIR"

            echo "==> Current directory: $(pwd)"
            echo "==> Build mode: $BUILD_MODE"
            echo "==> Update submodules: $UPDATE_SUBMODULES"

            if [ -f docker-compose.env-production.yml ]; then
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.env-production.yml"
            fi

            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "Docker Compose is not available."
              exit 1
            fi

            echo "==> Save previous running compose config"
            sudo docker compose --env-file .env $COMPOSE_FILES ps || true

            echo "==> Update root repo"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            git submodule sync --recursive
            git submodule update --init --recursive

            if [ "$UPDATE_SUBMODULES" = "true" ]; then
              echo "==> Pull latest main for every submodule"
              git submodule foreach --recursive '
                set -e
                default_branch=$(git remote show origin | sed -n "/HEAD branch/s/.*: //p")
                branch=${default_branch:-main}
                git fetch origin "$branch"
                git checkout "$branch"
                git pull --ff-only origin "$branch"
              '
            fi

            current_head() {
              path="$1"
              if [ -d "$path/.git" ] || [ -f "$path/.git" ]; then
                git -C "$path" rev-parse HEAD
              else
                echo "missing"
              fi
            }

            API_GATEWAY_HEAD=$(current_head gateway)
            AUTH_HEAD=$(current_head services/auth)
            USER_HEAD=$(current_head services/user)
            FRIEND_HEAD=$(current_head services/friend)
            NOTIFICATION_HEAD=$(current_head services/notification)
            UPLOAD_HEAD=$(current_head services/upload)
            CHAT_HEAD=$(current_head services/chat)
            AI_HEAD=$(current_head services/ai)
            COMPOSE_HEAD=$(git rev-parse HEAD)

            OLD_API_GATEWAY_HEAD=""
            OLD_AUTH_HEAD=""
            OLD_USER_HEAD=""
            OLD_FRIEND_HEAD=""
            OLD_NOTIFICATION_HEAD=""
            OLD_UPLOAD_HEAD=""
            OLD_CHAT_HEAD=""
            OLD_AI_HEAD=""
            OLD_COMPOSE_HEAD=""
            if [ -f "$STATE_FILE" ]; then
              . "$STATE_FILE"
            fi

            services_to_build=""
            add_service() {
              case " $services_to_build " in
                *" $1 "*) ;;
                *) services_to_build="$services_to_build $1" ;;
              esac
            }

            if [ "$BUILD_MODE" = "all" ]; then
              services_to_build=" api-gateway auth-service user-service friend-service notification-service upload-service chat-service ai-service"
            elif [ "$BUILD_MODE" = "single" ]; then
              services_to_build=" $SINGLE_SERVICE"
            elif [ "$BUILD_MODE" = "none" ]; then
              services_to_build=""
            else
              [ "$API_GATEWAY_HEAD" != "$OLD_API_GATEWAY_HEAD" ] && add_service api-gateway
              [ "$AUTH_HEAD" != "$OLD_AUTH_HEAD" ] && add_service auth-service
              [ "$USER_HEAD" != "$OLD_USER_HEAD" ] && add_service user-service
              [ "$FRIEND_HEAD" != "$OLD_FRIEND_HEAD" ] && add_service friend-service
              [ "$NOTIFICATION_HEAD" != "$OLD_NOTIFICATION_HEAD" ] && add_service notification-service
              [ "$UPLOAD_HEAD" != "$OLD_UPLOAD_HEAD" ] && add_service upload-service
              [ "$CHAT_HEAD" != "$OLD_CHAT_HEAD" ] && add_service chat-service
              [ "$AI_HEAD" != "$OLD_AI_HEAD" ] && add_service ai-service

              if [ "$COMPOSE_HEAD" != "$OLD_COMPOSE_HEAD" ]; then
                echo "Root compose/config changed; recreating containers after changed-service builds."
              fi
            fi

            echo "==> Services to build:$services_to_build"
            if [ -n "$(echo "$services_to_build" | xargs)" ]; then
              for svc in $services_to_build; do
                echo "==> Build $svc"
                sudo env COMPOSE_PARALLEL_LIMIT=1 docker compose --env-file .env $COMPOSE_FILES build "$svc"
              done
            fi

            echo "==> Start/recreate stack"
            sudo docker compose --env-file .env $COMPOSE_FILES up -d --no-build --remove-orphans

            echo "==> Wait for API health"
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000/api/health >/tmp/binchat-health.json; then
                cat /tmp/binchat-health.json
                echo
                break
              fi
              if [ "$i" = "30" ]; then
                echo "API Gateway health check failed."
                sudo docker compose --env-file .env $COMPOSE_FILES ps
                sudo docker logs api-gateway --tail=120 || true
                exit 1
              fi
              sleep 5
            done

            echo "==> Public HTTPS health"
            curl -fsS https://api.binchat.me/api/health
            echo

            {
              echo "OLD_API_GATEWAY_HEAD=\"$API_GATEWAY_HEAD\""
              echo "OLD_AUTH_HEAD=\"$AUTH_HEAD\""
              echo "OLD_USER_HEAD=\"$USER_HEAD\""
              echo "OLD_FRIEND_HEAD=\"$FRIEND_HEAD\""
              echo "OLD_NOTIFICATION_HEAD=\"$NOTIFICATION_HEAD\""
              echo "OLD_UPLOAD_HEAD=\"$UPLOAD_HEAD\""
              echo "OLD_CHAT_HEAD=\"$CHAT_HEAD\""
              echo "OLD_AI_HEAD=\"$AI_HEAD\""
              echo "OLD_COMPOSE_HEAD=\"$COMPOSE_HEAD\""
            } > "$STATE_FILE"

            echo "==> Cleanup dangling images"
            sudo docker image prune -f

            echo "==> Deploy done"
            sudo docker compose --env-file .env $COMPOSE_FILES ps
