# Production override for EC2.
# Use together with:
# docker-compose.yml + docker-compose.env-production.yml + docker-compose.prod-images.yml
#
# Purpose:
# - Switch runtime environment from development to production.
# - Load per-service .env.production files on EC2.
# - Set public CORS/domain values used by the deployed web app.

services:
  api-gateway:
    env_file:
      - ./gateway/api-gateway/.env.production
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://binchat.me,https://www.binchat.me,http://localhost:5173

  auth-service:
    env_file:
      - ./services/auth/.env.production
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://binchat.me,https://www.binchat.me,http://localhost:5173

  user-service:
    env_file:
      - ./services/user/.env.production
    environment:
      NODE_ENV: production

  friend-service:
    env_file:
      - ./services/friend/.env.production
    environment:
      NODE_ENV: production

  notification-service:
    env_file:
      - ./services/notification/.env.production
    environment:
      NODE_ENV: production

  upload-service:
    env_file:
      - ./services/upload/.env.production
    environment:
      NODE_ENV: production
      CORS_ORIGINS: https://binchat.me,https://www.binchat.me,http://localhost:5173

  chat-service:
    env_file:
      - ./services/chat/.env.production
    environment:
      NODE_ENV: production

  ai-service:
    env_file:
      - ./services/ai/.env.production
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://binchat.me,https://www.binchat.me,http://localhost:5173

  coturn:
    command: >
      -n
      --log-file=stdout
      --min-port=49152
      --max-port=49200
      --realm=api.binchat.me
      --user=${TURN_USERNAME:-binchat}:${TURN_PASSWORD:-CHANGE_ME_TURN_PASSWORD}
      --no-tls
      --no-dtls
      --fingerprint
      --lt-cred-mech
