name: Request Web Deploy

on:
  push:
    branches:
      - main

jobs:
  request-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger root web deploy
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ROOT_REPO_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/<owner>/<root-repo>/dispatches \
            -d '{"event_type":"web-deploy"}'
