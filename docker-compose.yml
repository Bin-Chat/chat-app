services:
  # ========================================
  # DATABASE - PostgreSQL
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatapp
      POSTGRES_INITDB_ARGS: '-A md5'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'effective_cache_size=1GB'
      - '-c'
      - 'maintenance_work_mem=64MB'
      - '-c'
      - 'checkpoint_completion_target=0.9'
      - '-c'
      - 'wal_buffers=16MB'
      - '-c'
      - 'default_statistics_target=100'
    networks:
      - chat-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatapp']
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # CACHE & SESSION - Redis
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command:
      - 'redis-server'
      - '--appendonly'
      - 'yes'
      - '--maxmemory'
      - '256mb'
      - '--maxmemory-policy'
      - 'allkeys-lru'
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # DATABASE - MongoDB (Chat)
  # ========================================
  mongo:
    image: mongo:7
    container_name: chat-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # EVENT BUS - Redpanda (Kafka-compatible)
  # ========================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: chat-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - '1'
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --check=false
    ports:
      - '19092:19092' # Kafka API (external / local dev)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - chat-network
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health | grep -E "Healthy:.+true" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ========================================
  # API GATEWAY (NestJS)
  # ========================================
  api-gateway:
    build:
      context: ./gateway/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3010
      - USER_SERVICE_URL=http://user-service:3020
      - FRIEND_SERVICE_URL=http://friend-service:3025
      - UPLOAD_SERVICE_URL=http://upload-service:3035
      - CHAT_SERVICE_URL=http://chat-service:3040
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000,http://localhost:8081,http://localhost:19006
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      friend-service:
        condition: service_healthy
      upload-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # MICROSERVICES - Auth Service (NestJS)
  # ========================================

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      - NODE_ENV=development
      - PORT=3010
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_service
      - DB_USERNAME=chatapp
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - USER_SERVICE_URL=http://user-service:3020
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3010/api/auth/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # MICROSERVICES - User Service (NestJS)
  # ========================================

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - '3020:3020'
    environment:
      - NODE_ENV=development
      - PORT=3020
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=user_service
      - DB_USERNAME=chatapp
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - KAFKA_BROKER=redpanda:9092
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3020/api/users/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # MICROSERVICES - Notification Service (NestJS)
  # ========================================

  # ========================================
  # MICROSERVICES - Friend Service (NestJS)
  # ========================================

  friend-service:
    build:
      context: ./services/friend
      dockerfile: Dockerfile
    container_name: friend-service
    restart: unless-stopped
    ports:
      - '3025:3025'
    environment:
      - NODE_ENV=development
      - PORT=3025
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=friend_service
      - DB_USERNAME=chatapp
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - KAFKA_BROKER=redpanda:9092
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3025/api/friends/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - '3030:3030'
    environment:
      - NODE_ENV=development
      - PORT=3030
      - KAFKA_BROKER=redpanda:9092
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - chat-network

  # ========================================
  # MICROSERVICES - Upload Service (NestJS)
  # ========================================

  upload-service:
    build:
      context: ./services/upload
      dockerfile: Dockerfile
    container_name: upload-service
    restart: unless-stopped
    ports:
      - '3035:3035'
    environment:
      - NODE_ENV=development
      - PORT=3035
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - CLOUDFRONT_URL=https://d1lcfg5g3uvpfy.cloudfront.net
      - PRESIGN_TTL=900
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3035/api/uploads/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # MICROSERVICES - Chat Service (NestJS + MongoDB)
  # ========================================

  chat-service:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    ports:
      - '3040:3040'
    environment:
      - NODE_ENV=development
      - PORT=3040
      - MONGO_URI=mongodb://mongo:27017/chat_service
      - KAFKA_BROKER=redpanda:9092
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3040/api/chat/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ========================================
# VOLUMES & NETWORKS
# ========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local
  mongo_data:
    driver: local

networks:
  chat-network:
    driver: bridge
